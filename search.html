const q = document.getElementById('q');
const out = document.getElementById('results');
const count = document.getElementById('count');
function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function hl(text, terms){
  let s = esc(text);
  for(const t of terms){ if(t.length<2) continue;
    s = s.replace(new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'),'<mark>$1</mark>'); }
  return s;
}
function score(rec, terms){
  let sc = 0; const t = rec.t.toLowerCase();
  for(const term of terms){
    if(t === term) sc += 100;
    else if(t.startsWith(term)) sc += 40;
    else if(t.includes(term)) sc += 25;
    else if(rec.k.includes(term)) sc += 8;
    else return -1;                 // every term must match somewhere
  }
  return sc;
}
function run(){
  const raw = q.value.trim().toLowerCase();
  const terms = raw.split(/\s+/).filter(Boolean);
  if(!terms.length){ out.innerHTML=''; count.textContent=''; return; }
  const hits = IDX.map(r=>({r,sc:score(r,terms)})).filter(x=>x.sc>=0)
                  .sort((a,b)=> b.sc-a.sc || a.r.t.localeCompare(b.r.t)).slice(0,40);
  count.textContent = hits.length ? (hits.length+' result'+(hits.length>1?'s':'')) : '';
  if(!hits.length){ out.innerHTML='<div class="empty">No matches. Try a condition, medication, or joint name.</div>'; return; }
  out.innerHTML = hits.map(({r})=>
    '<li><a href="'+esc(r.u)+'"><span class="rt">'+hl(r.t,terms)+'</span>'
    +'<span class="rs">'+esc(r.s)+(r.d?' &middot; '+esc(r.d):'')+'</span>'
    +(r.d?'':'')+'</a></li>').join('');
}
q.addEventListener('input', run);
// support ?q= deep-linking
const pre = new URLSearchParams(location.search).get('q');
if(pre){ q.value = pre; run(); }
</script>
